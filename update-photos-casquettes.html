<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mise à jour photos — Casquettes Baseball</title>
<style>
body{font-family:sans-serif;background:#1B2A45;color:#F2E9D8;padding:30px;max-width:600px;margin:0 auto;}
h1{font-size:18px;}
.row{background:#243652;padding:14px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.row img{width:50px;height:50px;object-fit:contain;background:#fff;border-radius:4px;}
.status{font-size:13px;}
.ok{color:#7C8F6E;}
.err{color:#B23B2E;}
button{background:#D89A2C;color:#10192C;border:none;padding:14px 24px;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<h1>🧢 Mise à jour des photos — Casquettes Baseball</h1>
<p>Cette page remplace les 11 photos floues/mal recadrées par les versions correctes, nettes, prises directement du catalogue OVET original. À utiliser une seule fois.</p>
<button id="runBtn">Mettre à jour les photos</button>
<div id="results" style="margin-top:20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="casquettes_images.js"></script>
<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const REFS = ['CAS171K','CAS171N','CAS171R','CAS171B','CAS171BG','CAS171M','CAS3382K','CAS3382N','CAS3382B','CAS3382BG','CAS3382M'];

document.getElementById('runBtn').addEventListener('click', async () => {
  const results = document.getElementById('results');
  results.innerHTML = '';

  if (typeof CASQUETTES_IMAGES === 'undefined') {
    results.innerHTML = '<div class="row"><div class="status err">✗ Erreur : casquettes_images.js ne s\'est pas chargé.</div></div>';
    return;
  }

  for (const ref of REFS) {
    const row = document.createElement('div');
    row.className = 'row';
    const img = CASQUETTES_IMAGES[ref] || '';
    row.innerHTML = `<img src="${img}"><div><div>${ref}</div><div class="status">Mise à jour…</div></div>`;
    results.appendChild(row);
    const statusEl = row.querySelector('.status');
    try {
      const { data, error } = await supabaseClient
        .from('products')
        .update({ image: img })
        .eq('ref', ref)
        .select('id, ref');
      if (error) throw error;
      if (!data || data.length === 0) {
        statusEl.textContent = '✗ AUCUNE ligne mise à jour (référence introuvable dans la base !)';
        statusEl.className = 'status err';
      } else {
        statusEl.textContent = `✓ Photo mise à jour (id réel: ${data[0].id})`;
        statusEl.className = 'status ok';
      }
    } catch (e) {
      statusEl.textContent = '✗ Erreur : ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
    }
  }

  const doneMsg = document.createElement('div');
  doneMsg.style.marginTop = '14px';
  doneMsg.style.fontWeight = 'bold';
  doneMsg.textContent = '— Terminé —';
  results.appendChild(doneMsg);
});
</script>
</body>
</html>
