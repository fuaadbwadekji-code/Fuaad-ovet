<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Catalogue Paris 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .header { background: #1e3d59; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 250px; padding: 15px; border: 1px solid #ddd; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .card h3 { font-size: 16px; margin: 10px 0; color: #333; }
        .card .price { color: #e74c3c; font-weight: bold; font-size: 18px; margin: 5px 0; }
        .card .ref { font-size: 12px; color: #777; }
        .btn-add { background: #ffc107; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cart-box { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Souvenirs de Paris 2026</h1>
        <p>Sélectionnez vos produits et commandez directement</p>
    </div>

    <div class="container" id="products-container">
        <!-- المنتجات ستظهر هنا تلقائياً -->
    </div>

    <div class="cart-box" onclick="envoyerCommande()">
        🛒 Commander sur WhatsApp (<span id="cart-count">0</span>)
    </div>

    <script>
        let panie = [];

        async function chargerCatalogue() {
            try {
                const res = await fetch('nouveaux_produits.json');
                const produits = await res.json();
                const container = document.getElementById('products-container');
                
                container.innerHTML = '';
                produits.forEach(p => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${p.image}" alt="${p.nom}">
                            <h3>${p.nom}</h3>
                            <div class="ref">Réf: ${p.reference}</div>
                            <div class="price">${p.prix.toFixed(2)} €</div>
                            <button class="btn-add" onclick="ajouterAuPanier('${p.nom}', ${p.prix})">Ajouter au Panier</button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Erreur de chargement du catalogue", err);
            }
        }

        function ajouterAuPanier(nom, prix) {
            panie.push({ nom, prix });
            document.getElementById('cart-count').innerText = panie.length;
        }

        function envoyerCommande() {
            if(panie.length === 0) { alert("Votre panier est vide !"); return; }
            let texte = "Bonjour, je souhaite commander :\n";
            panie.forEach((item, i) => { texte += `${i+1}. ${item.nom} - ${item.prix}€\n`; });
            window.open(`https://wa.me/33700000000?text=${encodeURIComponent(texte)}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', chargerCatalogue);
    </script>
</body>
</html>
