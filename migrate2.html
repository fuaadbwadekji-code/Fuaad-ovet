async function migrate() {
  document.getElementById('btn').disabled = true;
  document.getElementById('prog').style.display = 'block';
  
  const batchSize = 100;
  let done = 0;
  const total = PRODUCTS.length;
  
  log(`📦 Migration de ${total} produits...`, 'info');
  
  for (let i = 0; i < total; i += batchSize) {
    const batch = PRODUCTS.slice(i, i + batchSize);
    try {
      await insert(batch);
      done += batch.length;
      document.getElementById('prog').value = Math.round(done/total*100);
      document.getElementById('pinfo').textContent = `${done} / ${total} produits`;
      log(`✅ Batch ${Math.ceil((i+1)/batchSize)}: ${done}/${total}`);
    } catch(e) {
      log(`❌ Erreur batch ${Math.ceil((i+1)/batchSize)}: ${e.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 200));
  }
  
  // Settings
  log('⚙️ Migration settings...', 'info');
  const ok = await migrateSettings();
  log(ok ? '✅ Settings migrés!' : '❌ Erreur settings', ok ? 'ok' : 'err');
  
  log('🎉 MIGRATION TERMINÉE!', 'info');
  document.getElementById('btn').disabled = false;
}
