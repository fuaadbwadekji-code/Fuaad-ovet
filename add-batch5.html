function logRow(name) {
  const results = document.getElementById('results');
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<div class="name">${name}</div><div class="status wait">…</div>`;
  results.appendChild(row);
  return row.querySelector('.status');
}

async function addGroup(title, items, categoryId) {
  const results = document.getElementById('results');
  const header = document.createElement('h2');
  header.textContent = title + ' (' + items.length + ')';
  results.appendChild(header);

  let okCount = 0, errCount = 0;

  for (const item of items) {
    const statusEl = logRow(item.name);
    try {
      const { error } = await supabaseClient.from('products').upsert({
        id: item.ref,
        ref: item.ref,
        name: item.name,
        price: item.price,
        category_id: categoryId,
        image: null,
        unit_step: 1,
        unit_label: '',
        sort_order: 100,
        out_of_stock: item.outOfStock || false
      });
      if (error) throw error;
      statusEl.textContent = '✓';
      statusEl.className = 'status ok';
      okCount++;
    } catch (e) {
      statusEl.textContent = '✗ ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
      errCount++;
    }
  }
  return { okCount, errCount };
}

document.getElementById('runBtn').addEventListener('click', async function() {

  const catHeader = document.createElement('h2');

  let catErrors = 0;

      statusEl.className = 'status ok';
    } catch (e) {
      statusEl.textContent = '✗ ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
      catErrors++;
    }
  }

  let totalOk = 0, totalErr = catErrors;

  const groups = [
    ['Magnets Résine Timbre', MAGNETS_RESINE_TIMBRE, 'cat-magnets-resine-timbre'],
    ['Casquettes Baseball (nouvelles)', CASQUETTES_NOUVELLES, 'cat-casquettes'],

    ['Magnets Rectangle XL', MAGNETS_RECTANGLE_XL, 'cat-magnets-rectangle-xl']
  ];

  for (const [title, items, catId] of groups) {
    const r = await addGroup(title, items, catId);
    totalOk += r.okCount;
    totalErr += r.errCount;
  }

  const summary = document.getElementById('summary');
