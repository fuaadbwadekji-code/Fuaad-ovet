          .select('id')
          .single();

        if (insertCatRes.error) {
          if (insertCatRes.error.message && insertCatRes.error.message.indexOf('null value in column "id"') !== -1) {
            log('ℹ️ عمود id لا يتولّد تلقائياً، سيتم توليد معرف يدوياً...', 'info');
            catPayload.id = generateUUID();
            insertCatRes = await supabaseClient
              .from('categories')
              .insert([catPayload])
              .select('id')
              .single();
            if (insertCatRes.error) throw insertCatRes.error;
          } else {
            throw insertCatRes.error;
          }
        }

        categoryId = insertCatRes.data.id;
        log('✅ تم إنشاء القسم بنجاح (id: ' + categoryId + ').', 'ok');
      }

      log('📦 جاري التحقق من المنتجات الموجودة مسبقاً...');

      var refs = PRODUCTS.map(function(p) { return p.ref; });
      var existRes = await supabaseClient
        .from('products')
        .select('ref')
        .in('ref', refs);

      if (existRes.error) throw existRes.error;

      var existingRefs = {};
      (existRes.data || []).forEach(function(p) { existingRefs[p.ref] = true; });

      var toInsert = PRODUCTS.filter(function(p) { return !existingRefs[p.ref]; });
      var existingList = Object.keys(existingRefs);

      if (existingList.length > 0) {
        log('ℹ️ ' + existingList.length + ' منتج(ات) موجودة مسبقاً وسيتم تجاهلها: ' + existingList.join(', '), 'info');
      }

      if (toInsert.length === 0) {
        log('✅ كل المنتجات موجودة مسبقاً، لا حاجة لإضافة شيء جديد.', 'ok');
      } else {
        var maxProdRes = await supabaseClient
          .from('products')
          .select('sort_order')
          .order('sort_order', { ascending: false })
          .limit(1);

        if (maxProdRes.error) throw maxProdRes.error;

        var nextProdSort = (maxProdRes.data && maxProdRes.data.length > 0 && maxProdRes.data[0].sort_order != null)
          ? maxProdRes.data[0].sort_order + 1 : 1;

        var rows = toInsert.map(function(p, idx) {
          return {
            ref: p.ref,
            name: p.name,
            price: p.price,
            category_id: categoryId,
            image: IMAGES[p.ref] || null,
            sort_order: nextProdSort + idx
          };
        });

        log('📤 إضافة ' + rows.length + ' منتج جديد...');

        var insertProdRes = await supabaseClient
          .from('products')
          .insert(rows)
          .select('ref');

        if (insertProdRes.error) {
          if (insertProdRes.error.message && insertProdRes.error.message.indexOf('null value in column "id"') !== -1) {
            log('ℹ️ عمود id بجدول المنتجات لا يتولّد تلقائياً، سيتم توليد معرفات يدوياً...', 'info');
            rows.forEach(function(r) { r.id = generateUUID(); });
            insertProdRes = await supabaseClient
              .from('products')
              .insert(rows)
              .select('ref');
            if (insertProdRes.error) throw insertProdRes.error;
          } else {
            throw insertProdRes.error;
          }
        }

        var insertedRefs = insertProdRes.data.map(function(p) { return p.ref; });
        log('✅ تمت إضافة ' + insertedRefs.length + ' منتج بنجاح: ' + insertedRefs.join(', '), 'ok');
      }

      log('🎉 العملية اكتملت بنجاح!', 'ok');
      btn.textContent = '✅ تمت الإضافة بنجاح';
      btn.disabled = false;

    } catch (err) {
      log('❌ خطأ: ' + (err && (err.message || err.details || JSON.stringify(err))), 'err');
      btn.textContent = '❌ حدث خطأ — أعد المحاولة';
      btn.disabled = false;
    }
  }

  function loadSupabaseSdk(callback) {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload = function() { callback(); };
    script.onerror = function() {
      sdkLoadError = 'تعذر الوصول لـ cdn.jsdelivr.net (تحققي من الإنترنت أو جربي شبكة أخرى)';
      callback();
    };
    document.head.appendChild(script);
  }

  document.addEventListener('DOMContentLoaded', function() {
    renderPreview();
    $('runBtn').addEventListener('click', runImport);
    $('recheckBtn').addEventListener('click', runPreCheck);
    loadSupabaseSdk(runPreCheck);
  });
})();
</script>

</body>
</html>
