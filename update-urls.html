<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Update URLs</title>
<style>
body{font-family:monospace;background:#0a0a0a;color:#00ff00;padding:20px;}
h2{color:#fff;}
button{background:#00ff00;color:#000;border:none;padding:12px 24px;font-size:16px;cursor:pointer;border-radius:4px;font-weight:bold;}
button:disabled{background:#444;color:#888;}
#log{background:#111;border:1px solid #333;padding:15px;height:400px;overflow-y:auto;margin-top:15px;font-size:11px;}
.ok{color:#00ff00;}.err{color:#ff4444;}.info{color:#ffff00;}
progress{width:100%;height:20px;margin:5px 0;}
#stats{color:#fff;margin:10px 0;}
</style>
</head>
<body>
<h2>Update URLs Supabase Storage to GitHub</h2>
<div id="stats">En attente...</div>
<progress id="prog" value="0" max="100" style="display:none"></progress>
<button onclick="run()">Mettre a jour les URLs</button>
<div id="log"></div>
<script>
var SUPA_URL = 'https://ujwjydjjxzlmwuxaoukf.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqd2p5ZGpqeHpsbXd1eGFvdWtmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTg4NjE1NywiZXhwIjoyMDk3NDYyMTU3fQ.ZZavkW9aXdFhJu5TmC3rjgIbrOf6qoNlOGbpR1DK538';
var GH_BASE = 'https://raw.githubusercontent.com/fuaadbwadekji-code/Fuaad-ovet/main/images/';
function log(msg,type){type=type||'ok';var el=document.getElementById('log');el.innerHTML+='<div class="'+type+'">['+new Date().toLocaleTimeString()+'] '+msg+'</div>';el.scrollTop=el.scrollHeight;}
async function run(){
  document.querySelector('button').disabled=true;
  document.getElementById('prog').style.display='block';
  try{
    log('Chargement...','info');
    var products=[],from=0;
    while(true){
      var res=await fetch(SUPA_URL+'/rest/v1/products?select=id,image&limit=100&offset='+from,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
      var batch=await res.json();
      if(!batch||batch.length===0)break;
      products=products.concat(batch);
      from+=batch.length;
      if(batch.length<100)break;
    }
    log(products.length+' produits charges','info');
    var updated=0,skipped=0,errors=0;
    for(var i=0;i<products.length;i++){
      var p=products[i];
      if(!p.image||p.image.indexOf('supabase.co/storage')===-1){skipped++;continue;}
      var parts=p.image.split('/Product-images/');
      if(parts.length<2){skipped++;continue;}
      var newUrl=GH_BASE+parts[1];
      var r=await fetch(SUPA_URL+'/rest/v1/products?id=eq.'+encodeURIComponent(p.id),{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=minimal'},body:JSON.stringify({image:newUrl})});
      if(r.ok)updated++;else{errors++;log('Erreur '+p.id+': '+r.status,'err');}
      document.getElementById('prog').value=Math.round((i+1)/products.length*100);
      document.getElementById('stats').textContent=updated+' mis a jour — '+skipped+' ignores — '+errors+' erreurs';
      if(updated>0&&updated%50===0)log(updated+'/'+products.length);
      await new Promise(function(resolve){setTimeout(resolve,30);});
    }
    log('TERMINE! '+updated+' URLs mises a jour!','info');
    log('Vous pouvez maintenant annuler abonnement Supabase!','ok');
  }catch(e){log('Erreur: '+e.message,'err');}
  document.querySelector('button').disabled=false;
}
</script>
</body>
</html>
