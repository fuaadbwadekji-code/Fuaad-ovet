    // Try fetching from old Supabase
    let allProducts = [];
    let from = 0;
    const batchSize = 100;
    
    while(true) {
      const res = await fetch(`${OLD_URL}/rest/v1/products?select=*&limit=${batchSize}&offset=${from}`, {
        headers: {
          'apikey': OLD_KEY,
          'Authorization': `Bearer ${OLD_KEY}`
        }
      });
      
      if (!res.ok) {
        log('⚠️ Ancien Supabase inaccessible, utilisation du backup JSON...', 'info');
        break;
      }
      
      const batch = await res.json();
      if (!batch.length) break;
      allProducts = allProducts.concat(batch);
      from += batchSize;
      if (batch.length < batchSize) break;
    }
    
    if (allProducts.length === 0) {
      log('⚠️ Pas de produits depuis ancien Supabase. Veuillez uploader le fichier backup.', 'err');
      document.getElementById('btnProds').disabled = false;
      return;
    }
    
    log(`📋 ${allProducts.length} produits à migrer...`, 'info');
    
    // Insert in batches of 50
    const insertBatch = 50;
    let inserted = 0;
    
    for (let i = 0; i < allProducts.length; i += insertBatch) {
      const batch = allProducts.slice(i, i + insertBatch);
      await supabaseInsert('products', batch);
      inserted += batch.length;
      prog.value = Math.round((inserted / allProducts.length) * 100);
      document.getElementById('progress-info').textContent = `${inserted} / ${allProducts.length}`;
      log(`✅ ${inserted}/${allProducts.length} produits insérés`);
    }
    
    log(`🎉 Migration terminée! ${inserted} produits.`);
    
  } catch(e) {
    log('❌ Erreur: ' + e.message, 'err');
  }
  
  document.getElementById('btnProds').disabled = false;
}
