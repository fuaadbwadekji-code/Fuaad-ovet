}

button{

}

button:hover{

}

button:active{
  transform: translateY(0);
}

button:disabled{

  opacity: 0.6;
}

.stats{

  padding: 15px;
  border-radius: 8px;
  margin-top: 20px;

.stats-item{

  border-bottom: 1px solid #3A4A62;
}

.stats-item:last-child{
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.done-message{
  background: #2A4A2A;
  border: 1px solid #7C8F6E;

  padding: 15px;
  border-radius: 8px;

  text-align: center;

.error-message{

.info-box{

const CATEGORY_NAMES = {
  'couleur': '🎨 أكواب ملونة',

let supabaseClient;
let allProducts = [];
let totalStats = { total: 0, success: 0, error: 0 };

// دالة البحث عن المنتج
function getProduct(ref) {
  return allProducts.find(p => p.id === ref);
}

// دالة إضافة جميع المنتجات
async function addAllProducts() {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const categoriesContainer = document.getElementById('categories');
    categoriesContainer.innerHTML = '';
    
    // إعادة تعيين الإحصائيات
    totalStats = { total: 0, success: 0, error: 0 };
    
    // إنشاء عناصر التصنيفات
    for (const [categoryKey, products] of Object.entries(PRODUCTS_DATA)) {
      const categorySection = document.createElement('div');
      categorySection.className = 'category-section';
      
      const titleEl = document.createElement('div');
      titleEl.className = 'category-title';
      titleEl.textContent = CATEGORY_NAMES[categoryKey];
      categorySection.appendChild(titleEl);
      
      const productsGrid = document.createElement('div');
      productsGrid.className = 'products-grid';
      
      for (const product of products) {
        const item = document.createElement('div');
        item.className = 'product-item';
        item.id = 'item-' + product.ref;
        
        const img = document.createElement('img');
        img.src = VERRE_IMAGES[product.ref] || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23ccc%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';
        img.className = 'product-image';
        
        const ref = document.createElement('div');
        ref.className = 'product-ref';
        ref.textContent = product.ref;
        
        const status = document.createElement('div');
        status.className = 'product-status status-loading';
        status.textContent = 'في الانتظار...';
        
        item.appendChild(img);
        item.appendChild(ref);
        item.appendChild(status);
        productsGrid.appendChild(item);
      }
      
      categorySection.appendChild(productsGrid);
      categoriesContainer.appendChild(categorySection);
      totalStats.total += products.length;
    }
    
    // عرض الإحصائيات
    document.getElementById('stats').style.display = 'block';
    document.getElementById('totalProducts').textContent = totalStats.total;
    document.getElementById('addAllBtn').disabled = true;
    
    // إضافة المنتجات
    for (const [categoryKey, products] of Object.entries(PRODUCTS_DATA)) {
      for (const product of products) {
        await addProductToDb(product);
      }
    }
    
    // إنهاء
    document.getElementById('doneMessage').style.display = 'block';
    document.getElementById('clearBtn').style.display = 'inline-block';
    
  } catch (error) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'block';
    errorDiv.textContent = '❌ خطأ: ' + (error.message || JSON.stringify(error));
  }
}

// دالة إضافة منتج واحد
async function addProductToDb(product) {
  const itemEl = document.getElementById('item-' + product.ref);
  const statusEl = itemEl?.querySelector('.product-status');
  
  try {
    const imageUrl = VERRE_IMAGES[product.ref] || '';
    
    // محاولة الإدراج
    const { data, error } = await supabaseClient.from('products').insert([{
      id: product.ref,
      name: product.name,
      price: product.price,
      category: product.category,
      image: imageUrl,
      reference: product.ref
    }]);
    
    if (error) throw error;
    
    if (statusEl) {
      statusEl.textContent = '✓ تمت الإضافة';
      statusEl.className = 'product-status status-ok';
    }
    totalStats.success++;
    
  } catch (error) {
    // قد يكون المنتج موجود بالفعل، نحاول التحديث
    try {
      const { error: updateError } = await supabaseClient.from('products').update({
        name: product.name,
        price: product.price,
        category: product.category,
        image: VERRE_IMAGES[product.ref] || '',
        reference: product.ref
      }).eq('id', product.ref);
      
      if (updateError) throw updateError;
      
      if (statusEl) {
        statusEl.textContent = '🔄 تم التحديث';
        statusEl.className = 'product-status status-ok';
      }
      totalStats.success++;
      
    } catch (err) {
      if (statusEl) {
        statusEl.textContent = '✗ ' + (err.message?.substring(0, 20) || 'خطأ');
        statusEl.className = 'product-status status-error';
      }
      totalStats.error++;
    }
  }
  
  // تحديث الإحصائيات
  document.getElementById('successCount').textContent = totalStats.success;
  document.getElementById('errorCount').textContent = totalStats.error;
}

// دالة حذف الكل
function clearAll() {
  if (confirm('هل أنت متأكد؟ سيتم إعادة تعيين الصفحة.')) {
    location.reload();
  }
}

// تحميل البيانات الأولية
window.addEventListener('load', () => {
  // تجهيز جميع المنتجات في قائمة واحدة
  for (const category of Object.values(PRODUCTS_DATA)) {
    allProducts.push(...category);
  }
});
