<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Migration Images → GitHub</title>
<style>
body { font-family: monospace; background: #0a0a0a; color: #00ff00; padding: 20px; }
h2 { color: #fff; }
button { background: #00ff00; color: #000; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 4px; font-weight: bold; margin: 5px; }
button:disabled { background: #444; color: #888; cursor: not-allowed; }
input { background: #111; color: #fff; border: 1px solid #00ff00; padding: 10px; width: 100%; font-size: 14px; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
label { color: #ffff00; font-size: 13px; display: block; margin-bottom: 4px; }
#log { background: #111; border: 1px solid #333; padding: 15px; height: 350px; overflow-y: auto; margin-top: 15px; font-size: 11px; }
.ok { color: #00ff00; } .err { color: #ff4444; } .info { color: #ffff00; }
progress { width: 100%; height: 20px; margin: 5px 0; }
#stats { color: #fff; margin: 10px 0; font-size: 14px; }
.config-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
</style>
</head>
<body>
<h2>🚀 Migration Images Supabase → GitHub</h2>

<div class="config-box">
  <label>GitHub Personal Access Token (repo scope)</label>
  <input type="password" id="ghToken" placeholder="ghp_xxxxx...">
  <small style="color:#888;">Le token ne sera jamais sauvegardé dans le code</small>
</div>

<div id="stats">En attente...</div>
<progress id="prog" value="0" max="100" style="display:none"></progress>
<br>
<button id="btn1" onclick="startMigration()">▶ Démarrer la migration</button>
<button id="btn2" onclick="updateDBUrls()" disabled>2. Mettre à jour les URLs en DB</button>
<div id="log"></div>

<script>
const OLD_URL = 'https://ujwjydjjxzlmwuxaoukf.supabase.co';
const OLD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqd2p5ZGpqeHpsbXd1eGFvdWtmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTg4NjE1NywiZXhwIjoyMDk3NDYyMTU3fQ.ZZavkW9aXdFhJu5TmC3rjgIbrOf6qoNlOGbpR1DK538';
const NEW_URL = 'https://psjtlgbybpbansstnqdi.supabase.co';
const NEW_KEY = 'sb_publishable_VCdoLmlBSk5v2WgGtQJdzg_k3FS8_yb';
const GH_REPO = 'fuaadbwadekji-code/Fuaad-ovet';
const GH_BRANCH = 'main';
const GH_FOLDER = 'images';

let urlMapping = {};

function log(msg, type='ok') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setStats(txt) { document.getElementById('stats').textContent = txt; }

async function listAllFiles() {
  log('📋 Récupération de la liste des fichiers...', 'info');
  let files = [];
  let offset = 0;
  const limit = 100;
  while(true) {
    const res = await fetch(`${OLD_URL}/storage/v1/object/list/Product-images`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OLD_KEY}`, 'apikey': OLD_KEY },
      body: JSON.stringify({ limit, offset, prefix: "", sortBy: { column: 'name', order: 'asc' } })
    });
    if (!res.ok) throw new Error(await res.text());
    const batch = await res.json();
    if (!batch || batch.length === 0) break;
    files = files.concat(batch);
    log(`📦 ${files.length} fichiers trouvés...`, 'info');
    if (batch.length < limit) break;
    offset += limit;
  }
  return files;
}

async function getGitHubFileSha(path, token) {
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) return (await res.json()).sha;
  } catch(e) {}
  return null;
}

async function uploadToGitHub(filename, base64Content, token) {
  const path = `${GH_FOLDER}/${filename}`;
  const sha = await getGitHubFileSha(path, token);
  const body = { message: `img: ${filename}`, content: base64Content, branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return `https://raw.githubusercontent.com/${GH_REPO}/${GH_BRANCH}/${path}`;
}

async function downloadFromSupabase(filename) {
  const res = await fetch(`${OLD_URL}/storage/v1/object/Product-images/${filename}`, {
    headers: { 'Authorization': `Bearer ${OLD_KEY}`, 'apikey': OLD_KEY }
  });
  if (!res.ok) throw new Error(`Download failed: ${res.status}`);
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function startMigration() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) { log('❌ Entrez votre GitHub token', 'err'); return; }
  
  document.getElementById('btn1').disabled = true;
  document.getElementById('prog').style.display = 'block';
  urlMapping = {};

  try {
    const files = await listAllFiles();
    log(`✅ ${files.length} fichiers à migrer`, 'info');
    
    let done = 0, errors = 0, skipped = 0;
    
    for (const file of files) {
      const filename = file.name;
      if (!filename) continue;
      
      try {
        const base64 = await downloadFromSupabase(filename);
        const newUrl = await uploadToGitHub(filename, base64, token);
        const oldUrl = `${OLD_URL}/storage/v1/object/public/Product-images/${filename}`;
        urlMapping[oldUrl] = newUrl;
        done++;
        const pct = Math.round(done / files.length * 100);
        document.getElementById('prog').value = pct;
        setStats(`${done} / ${files.length} ✅ — ${errors} erreurs`);
        if (done % 20 === 0) log(`✅ ${done}/${files.length}`, 'ok');
        await new Promise(r => setTimeout(r, 150));
      } catch(e) {
        errors++;
        log(`❌ ${filename}: ${e.message.substring(0,80)}`, 'err');
      }
    }
    
    localStorage.setItem('url_mapping', JSON.stringify(urlMapping));
    log(`🎉 Terminé! ${done} images uploadées, ${errors} erreurs`, 'info');
    document.getElementById('btn2').disabled = false;
    
  } catch(e) {
    log(`❌ Erreur: ${e.message}`, 'err');
    document.getElementById('btn1').disabled = false;
  }
}

async function updateDBUrls() {
  const token = document.getElementById('ghToken').value.trim();
  document.getElementById('btn2').disabled = true;
  log('🔄 Mise à jour des URLs en base de données...', 'info');
  
  const mapping = JSON.parse(localStorage.getItem('url_mapping') || '{}');
  if (Object.keys(mapping).length === 0) {
    log('❌ Pas de mapping. Relancez la migration.', 'err');
    return;
  }
  
  try {
    let products = [];
    let from = 0;
    while(true) {
      const res = await fetch(`${OLD_URL}/rest/v1/products?select=id,image&limit=100&offset=${from}`, {
        headers: { 'apikey': OLD_KEY, 'Authorization': `Bearer ${OLD_KEY}` }
      });
      const batch = await res.json();
      if (!batch.length) break;
      products = products.concat(batch);
      from += batch.length;
      if (batch.length < 100) break;
    }
    
    log(`📦 ${products.length} produits`, 'info');
    let updated = 0;
    
    for (const p of products) {
      if (!p.image) continue;
      const newUrl = mapping[p.image];
      if (!newUrl) continue;
      
      await fetch(`${NEW_URL}/rest/v1/products?id=eq.${encodeURIComponent(p.id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': NEW_KEY, 'Authorization': `Bearer ${NEW_KEY}` },
        body: JSON.stringify({ image: newUrl })
      });
      updated++;
    }
    
    log(`✅ ${updated} produits mis à jour!`, 'ok');
    log('🎉 MIGRATION COMPLÈTE! Vous pouvez passer au Free plan.', 'info');
  } catch(e) {
    log(`❌ ${e.message}`, 'err');
  }
}
</script>
</body>
</html>
