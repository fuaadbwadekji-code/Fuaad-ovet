<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>عرض كل المنتجات الموجودة بالموقع</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;padding:16px;}
h2{font-size:18px;}
button{padding:16px 22px;font-size:18px;width:100%;border-radius:10px;border:none;background:#2563eb;color:#fff;font-weight:bold;margin-bottom:14px;}
button:disabled{background:#555;}
#stats{font-size:16px;font-weight:bold;background:#243652;padding:12px;border-radius:8px;margin-bottom:14px;}
.cat-block{background:#1c2940;border-radius:8px;margin-bottom:10px;padding:10px 14px;}
.cat-title{font-weight:bold;color:#D89A2C;font-size:15px;margin-bottom:6px;}
.ref-list{font-size:13px;line-height:1.6;color:#ccc;word-break:break-all;}
textarea{width:100%;height:300px;background:#000;color:#5f5;font-family:monospace;font-size:12px;margin-top:14px;border-radius:6px;border:1px solid #333;padding:10px;}
.err{color:#f55;background:#311;padding:10px;border-radius:6px;}
</style>
</head>
<body>
<h2>📋 كل المنتجات الموجودة بقاعدة البيانات</h2>
<button id="runBtn">اجلب كل المنتجات</button>
<div id="stats"></div>
<div id="output"></div>
<h3>نسخة نصية (للنسخ ولصقها لكلود إذا حبيتي)</h3>
<textarea id="rawText" readonly></textarea>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ujwjydjjxzlmwuxaoukf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_X95sZEaadGOpz9b4PkJvAA_Wq1K_aN9';
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('runBtn').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'جاري التحميل...';
  const statsEl = document.getElementById('stats');
  const outputEl = document.getElementById('output');
  const rawTextEl = document.getElementById('rawText');
  outputEl.innerHTML = '';
  statsEl.textContent = '';
  rawTextEl.value = '';

  try {
    // جلب كل الفئات
    const { data: categories, error: catErr } = await client.from('categories').select('id, name, sort_order').order('sort_order');
    if (catErr) throw catErr;

    // جلب كل المنتجات (قد نحتاج صفحات إذا أكتر من 1000)
    let allProducts = [];
    let from = 0;
    const pageSize = 1000;
    while (true) {
      const { data, error } = await client
        .from('products')
        .select('id, ref, name, price, category_id, image, out_of_stock')
        .range(from, from + pageSize - 1);
      if (error) throw error;
      if (!data || data.length === 0) break;
      allProducts = allProducts.concat(data);
      if (data.length < pageSize) break;
      from += pageSize;
    }

    statsEl.textContent = `📦 إجمالي المنتجات: ${allProducts.length} | 🗂️ إجمالي الفئات: ${categories.length}`;

    // تجميع حسب الفئة
    const byCategory = {};
    for (const p of allProducts) {
      const cat = p.category_id || '(بدون فئة)';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(p);
    }

    const catNameMap = {};
    for (const c of categories) catNameMap[c.id] = c.name;

    let rawLines = [];
    rawLines.push(`=== إجمالي المنتجات: ${allProducts.length} ===`);
    rawLines.push('');

    // رتب الفئات حسب الاسم
    const catIds = Object.keys(byCategory).sort();

    for (const catId of catIds) {
      const items = byCategory[catId];
      const catName = catNameMap[catId] || catId;

      const block = document.createElement('div');
      block.className = 'cat-block';
      const title = document.createElement('div');
      title.className = 'cat-title';
      title.textContent = `${catName} (${catId}) — ${items.length} منتج`;
      block.appendChild(title);

      const refsList = items.map(p => p.ref || p.id).sort().join(', ');
      const refDiv = document.createElement('div');
      refDiv.className = 'ref-list';
      refDiv.textContent = refsList;
      block.appendChild(refDiv);

      outputEl.appendChild(block);

      rawLines.push(`--- ${catName} (${catId}) — ${items.length} منتج ---`);
      rawLines.push(refsList);
      rawLines.push('');
    }

    rawTextEl.value = rawLines.join('\n');

  } catch (e) {
    outputEl.innerHTML = '<div class="err">خطأ: ' + (e.message || JSON.stringify(e)) + '</div>';
  }

  btn.disabled = false;
  btn.textContent = 'تحديث القائمة';
});
</script>
</body>
</html>
