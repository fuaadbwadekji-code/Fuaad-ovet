<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagnostic</title>
<style>
body{font-family:sans-serif;background:#1B2A45;color:#F2E9D8;padding:30px;max-width:600px;margin:0 auto;}
.row{background:#243652;padding:14px;border-radius:8px;margin-bottom:10px;}
img{max-width:200px;display:block;margin-top:8px;background:#fff;}
pre{background:#10192C;padding:10px;border-radius:6px;overflow-x:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;}
button{background:#D89A2C;color:#10192C;border:none;padding:14px 24px;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:20px;}
</style>
</head>
<body>
<h1>🔍 Diagnostic — image réelle dans Supabase</h1>
<button id="checkBtn">Vérifier les 12 produits</button>
<div id="results"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const REFS = ['MR01','MR03','MR04','MRTO1','MRTO2','BN45R','BN45N','BN45M','BN45AF','BN45BG','BN45RS','BN45BL'];
document.getElementById('checkBtn').addEventListener('click', async () => {
  const results = document.getElementById('results');
  results.innerHTML = 'Chargement…';
  const { data, error } = await supabaseClient.from('products').select('id, ref, name, image, category_id').in('id', REFS);
  if (error) {
    results.innerHTML = '<div class="row">Erreur : ' + error.message + '</div>';
    return;
  }
  results.innerHTML = '';
  if (!data || data.length === 0) {
    results.innerHTML = '<div class="row">⚠️ Aucun produit trouvé !</div>';
    return;
  }
  // Afficher dans l'ordre de REFS, et signaler les manquants
  REFS.forEach(ref => {
    const p = data.find(x => x.id === ref);
    const div = document.createElement('div');
    div.className = 'row';
    if (!p) {
      div.innerHTML = `<strong>${ref}</strong> — ⚠️ INTROUVABLE dans la base`;
      div.style.color = '#ff8080';
    } else {
      const imgLen = p.image ? p.image.length : 0;
      div.innerHTML = `
        <strong>${p.id}</strong> (catégorie: ${p.category_id})<br>
        Longueur image : ${imgLen} caractères<br>
        <img src="${p.image || ''}">
      `;
    }
    results.appendChild(div);
  });
});
</script>
</body>
</html>
