function logRow(name) {
  const results = document.getElementById('results');
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<div class="name">${name}</div><div class="status wait">…</div>`;
  results.appendChild(row);
  return row.querySelector('.status');
}

async function addGroup(title, items, categoryId) {
  const results = document.getElementById('results');
  const header = document.createElement('h2');
  header.textContent = title + ' (' + items.length + ')';
  results.appendChild(header);

  let okCount = 0, errCount = 0;

  for (const item of items) {
    const statusEl = logRow(item.name);
    try {
      const { error } = await supabaseClient.from('products').upsert({
        id: item.ref,
        ref: item.ref,
        name: item.name,
        price: item.price,
        category_id: categoryId,
        image: null,
        unit_step: 1,
        unit_label: '',
        sort_order: 100,
        out_of_stock: item.outOfStock || false
      });
      if (error) throw error;
      statusEl.textContent = '✓';
      statusEl.className = 'status ok';
      okCount++;
    } catch (e) {
      statusEl.textContent = '✗ ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
      errCount++;
    }
  }
  return { okCount, errCount };
}

document.getElementById('runBtn').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'جاري الإضافة...';
  const results = document.getElementById('results');
  results.innerHTML = '';

  const catHeader = document.createElement('h2');
  catHeader.textContent = 'Catégories';
  results.appendChild(catHeader);

  let catErrors = 0;
  for (const cat of NEW_CATEGORIES) {
    const statusEl = logRow(cat.name);
    try {
      const { error } = await supabaseClient.from('categories').upsert({ id: cat.id, name: cat.name, sort_order: cat.sort_order });
      if (error) throw error;
      statusEl.textContent = '✓';
      statusEl.className = 'status ok';
    } catch (e) {
      statusEl.textContent = '✗ ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
      catErrors++;
    }
  }

  let totalOk = 0, totalErr = catErrors;

  const groups = [
    ['Porte-clés G-series', PORTE_CLES_G, 'cat-portes-cles-g'],
    ['Miroirs Ronds PM', MIROIRS_RONDS, 'cat-miroirs-ronds-pm'],
    ['Miroirs Rectangle Strass', MIROIRS_RECT, 'cat-miroirs-rect-strass'],
    ['Magnets Métal', MAGNETS_METAL, 'cat-magnets-metal'],
    ['Magnets Rectangles', MAGNETS_RECTANGLES, 'cat-magnets-rectangles'],
    ['Magnets Résine', MAGNETS_RESINE_2, 'cat-magnets-resine-2'],
    ['Drapeaux', DRAPEAUX, 'cat-drapeaux'],
    ['Sacs Toile (nouveaux)', SACS_TOILE_2, 'cat-sacs-toile-2'],
    ['Sacs Shopping', SACS_SHOPPING, 'cat-sacs-shopping'],
    ['Tote Bag (manquant)', TOTE_BAG_MISSING, 'cat-tote-bag-2'],
    ['Dessous de Verre', DESSOUS_VERRE, 'cat-dessous-verre'],
    ['Briquets Clipper', BRIQUETS, 'cat-briquets']
  ];

  for (const [title, items, catId] of groups) {
    const r = await addGroup(title, items, catId);
    totalOk += r.okCount;
    totalErr += r.errCount;
  }

  const summary = document.getElementById('summary');
  summary.style.display = 'block';
  summary.textContent = `— انتهى — ✓ ${totalOk} منتج تمت إضافته بنجاح | ✗ ${totalErr} خطأ`;
  summary.style.background = totalErr > 0 ? '#B23B2E' : '#2d5a2d';

  btn.textContent = 'تمت العملية ✓';
});
</script>
