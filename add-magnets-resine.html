<script>
(function() {
  "use strict";

  var SUPABASE_URL = "https://ujwjydjjxzlmwuxaoukf.supabase.co";
  var SUPABASE_KEY = "sb_publishable_X95sZEaadGOpz9b4PkJvAA_Wq1K_aN9";
  var CATEGORY_NAME = "MAGNETS RÉSINE";

  var PRODUCTS = [{"ref": "MAT107", "name": "Magnet Résine - Timbre I Love Paris", "price": 1.0}, {"ref": "MAT108", "name": "Magnet Résine - Timbre Paris", "price": 1.0}, {"ref": "MAT109", "name": "Magnet Résine - Arc de Triomphe Paris", "price": 1.0}, {"ref": "MAT110", "name": "Magnet Résine - Notre-Dame de Paris", "price": 1.0}, {"ref": "MAT111", "name": "Magnet Résine - Notre-Dame de Paris (relief)", "price": 1.0}, {"ref": "MAT112", "name": "Magnet Résine - Paris (Tour Eiffel, Notre-Dame, Arc)", "price": 1.0}];

  var IMAGES = {};
  try {
    IMAGES = JSON.parse(document.getElementById('images-data').textContent);
  } catch (e) {
    IMAGES = {};
  }

  var supabaseClient = null;
  var sdkLoadError = null;

  function $(id) { return document.getElementById(id); }

  function log(msg, type) {
    var el = $('log');
    el.style.display = 'block';
    var cls = type === 'ok' ? 'status-ok' : type === 'err' ? 'status-err' : 'status-info';
    var span = document.createElement('span');
    span.className = cls;
    span.textContent = msg;
    el.appendChild(span);
    el.appendChild(document.createElement('br'));
    el.scrollTop = el.scrollHeight;
  }

  function renderPreview() {
    var list = $('productList');
    var html = '';
    for (var i = 0; i < PRODUCTS.length; i++) {
      var p = PRODUCTS[i];
      var src = IMAGES[p.ref] || '';
      html += '<div class="product-item">' +
        '<img src="' + src + '" alt="' + p.ref + '">' +
        '<div class="ref">' + p.ref + '</div>' +
        '<div class="price">' + p.price.toFixed(2) + '€</div>' +
        '</div>';
    }
    list.innerHTML = html;
  }

  function runPreCheck() {
    var box = $('preCheck');
    var problems = [];

    if (sdkLoadError) {
      problems.push('💥 فشل تحميل مكتبة Supabase من الإنترنت: ' + sdkLoadError);
    } else if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
      problems.push('💥 مكتبة Supabase (supabase-js) لم تُحمّل بعد. تأكدي من الاتصال بالإنترنت ثم اضغطي "أعد فحص المتطلبات".');
    }

    var missingImgs = [];
    for (var i = 0; i < PRODUCTS.length; i++) {
      if (!IMAGES[PRODUCTS[i].ref]) missingImgs.push(PRODUCTS[i].ref);
    }
    if (missingImgs.length > 0) {
      problems.push('⚠️ صور ناقصة: ' + missingImgs.join(', '));
    }

    var btn = $('runBtn');
    if (problems.length > 0) {
      box.className = 'err';
      box.innerHTML = '<strong>⚠️ تم رصد مشاكل:</strong><br>' + problems.join('<br>');
      btn.disabled = true;
    } else {
      box.className = 'ok';
      box.textContent = '✅ كل شي جاهز (' + PRODUCTS.length + ' صورة محمّلة، Supabase متصل). اضغطي الزر للبدء.';
      btn.disabled = false;
      if (!supabaseClient) {
        try {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
          box.className = 'err';
          box.textContent = '💥 فشل إنشاء عميل Supabase: ' + e.message;
          btn.disabled = true;
        }
      }
    }
  }

  async function runImport() {
    var btn = $('runBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري التنفيذ...';
    $('log').innerHTML = '';

    try {
      if (!supabaseClient) throw new Error('عميل Supabase غير جاهز، اضغطي "أعد فحص المتطلبات" أولاً.');

      log('🔎 التحقق من وجود القسم "' + CATEGORY_NAME + '"...');

      var catRes = await supabaseClient
        .from('categories')
        .select('id, name, sort_order')
        .eq('name', CATEGORY_NAME)
        .limit(1);

      if (catRes.error) throw catRes.error;

      var categoryId;

      if (catRes.data && catRes.data.length > 0) {
        categoryId = catRes.data[0].id;
        log('✅ القسم موجود مسبقاً (id: ' + categoryId + ') — سيتم إضافة المنتجات تحته.', 'ok');
      } else {
        var maxCatRes = await supabaseClient
          .from('categories')
          .select('sort_order')
          .order('sort_order', { ascending: false })
          .limit(1);

        if (maxCatRes.error) throw maxCatRes.error;

        var nextSortOrder = (maxCatRes.data && maxCatRes.data.length > 0 && maxCatRes.data[0].sort_order != null)
          ? maxCatRes.data[0].sort_order + 1 : 1;

        log('➕ القسم غير موجود، سيتم إنشاؤه بـ sort_order = ' + nextSortOrder + '...');

        var insertCatRes = await supabaseClient
          .from('categories')
          .insert([{ name: CATEGORY_NAME, sort_order: nextSortOrder }])
          .select('id')
          .single();

        if (insertCatRes.error) throw insertCatRes.error;

        categoryId = insertCatRes.data.id;
        log('✅ تم إنشاء القسم بنجاح (id: ' + categoryId + ').', 'ok');
      }

      log('📦 جاري التحقق من المنتجات الموجودة مسبقاً...');

      var refs = PRODUCTS.map(function(p) { return p.ref; });
      var existRes = await supabaseClient
        .from('products')
        .select('ref')
        .in('ref', refs);

      if (existRes.error) throw existRes.error;

      var existingRefs = {};
      (existRes.data || []).forEach(function(p) { existingRefs[p.ref] = true; });

      var toInsert = PRODUCTS.filter(function(p) { return !existingRefs[p.ref]; });
      var existingList = Object.keys(existingRefs);

      if (existingList.length > 0) {
        log('ℹ️ ' + existingList.length + ' منتج(ات) موجودة مسبقاً وسيتم تجاهلها: ' + existingList.join(', '), 'info');
      }

      if (toInsert.length === 0) {
        log('✅ كل المنتجات موجودة مسبقاً، لا حاجة لإضافة شيء جديد.', 'ok');
      } else {
        var maxProdRes = await supabaseClient
          .from('products')
          .select('sort_order')
          .order('sort_order', { ascending: false })
          .limit(1);

        if (maxProdRes.error) throw maxProdRes.error;

        var nextProdSort = (maxProdRes.data && maxProdRes.data.length > 0 && maxProdRes.data[0].sort_order != null)
          ? maxProdRes.data[0].sort_order + 1 : 1;

        var rows = toInsert.map(function(p, idx) {
          return {
            ref: p.ref,
            name: p.name,
            price: p.price,
            category_id: categoryId,
            image: IMAGES[p.ref] || null,
            sort_order: nextProdSort + idx
          };
        });

        log('📤 إضافة ' + rows.length + ' منتج جديد...');

        var insertProdRes = await supabaseClient
          .from('products')
          .insert(rows)
          .select('ref');

        if (insertProdRes.error) throw insertProdRes.error;

        var insertedRefs = insertProdRes.data.map(function(p) { return p.ref; });
        log('✅ تمت إضافة ' + insertedRefs.length + ' منتج بنجاح: ' + insertedRefs.join(', '), 'ok');
      }

      log('🎉 العملية اكتملت بنجاح!', 'ok');
      btn.textContent = '✅ تمت الإضافة بنجاح';
      btn.disabled = false;

    } catch (err) {
      log('❌ خطأ: ' + (err && (err.message || err.details || JSON.stringify(err))), 'err');
      btn.textContent = '❌ حدث خطأ — أعد المحاولة';
      btn.disabled = false;
    }
  }

  function loadSupabaseSdk(callback) {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload = function() { callback(); };
    script.onerror = function() {
      sdkLoadError = 'تعذر الوصول لـ cdn.jsdelivr.net (تحققي من الإنترنت أو جربي شبكة أخرى)';
      callback();
    };
    document.head.appendChild(script);
  }

  document.addEventListener('DOMContentLoaded', function() {
    renderPreview();
    $('runBtn').addEventListener('click', runImport);
    $('recheckBtn').addEventListener('click', runPreCheck);
    loadSupabaseSdk(runPreCheck);
  });
})();
</script>

</body>
</html>
