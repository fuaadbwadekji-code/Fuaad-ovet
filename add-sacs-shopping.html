<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajout — Sacs Shopping</title>
<style>
body{font-family:sans-serif;background:#1B2A45;color:#F2E9D8;padding:30px;max-width:600px;margin:0 auto;}
h1{font-size:18px;}
.row{background:#243652;padding:14px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.row img{width:50px;height:50px;object-fit:contain;background:#fff;border-radius:4px;}
.status{font-size:13px;}
.ok{color:#7C8F6E;}
.err{color:#B23B2E;}
button{background:#D89A2C;color:#10192C;border:none;padding:14px 24px;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<h1>👜 Ajout du catalogue "Sacs Shopping"</h1>
<p>Cette page ajoute la catégorie "Sacs Shopping" et ses 10 produits (réf. SAC2223 à SAC2232, 2,60€ chacun, vente à l'unité). À utiliser une seule fois.</p>
<button id="runBtn">Lancer l'ajout</button>
<div id="results" style="margin-top:20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sacs_images.js"></script>
<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const NEW_CATEGORY = { id: 'cat-sacs', name: 'Sacs Shopping', sort_order: 2 };

const NEW_PRODUCTS = [
  { id: 'SAC2223', ref: 'SAC2223', name: 'Sac shopping — fleurs noir et blanc' },
  { id: 'SAC2224', ref: 'SAC2224', name: 'Sac shopping — Welcome to Paris croquis' },
  { id: 'SAC2225', ref: 'SAC2225', name: 'Sac shopping — chats et coeurs' },
  { id: 'SAC2226', ref: 'SAC2226', name: 'Sac shopping — fleurs bleu jean' },
  { id: 'SAC2227', ref: 'SAC2227', name: 'Sac shopping — fleurs roses' },
  { id: 'SAC2228', ref: 'SAC2228', name: 'Sac shopping — toile bleue fleurie' },
  { id: 'SAC2229', ref: 'SAC2229', name: 'Sac shopping — macarons' },
  { id: 'SAC2230', ref: 'SAC2230', name: 'Sac shopping — monuments bleu marine' },
  { id: 'SAC2231', ref: 'SAC2231', name: 'Sac shopping — Seine en automne' },
  { id: 'SAC2232', ref: 'SAC2232', name: 'Sac shopping — rue de Montmartre' }
];

document.getElementById('runBtn').addEventListener('click', async () => {
  const results = document.getElementById('results');
  results.innerHTML = '';

  // 1. Créer la catégorie (ignore si déjà existante)
  const catRow = document.createElement('div');
  catRow.className = 'row';
  catRow.innerHTML = `<div><div>Catégorie : ${NEW_CATEGORY.name}</div><div class="status">Création…</div></div>`;
  results.appendChild(catRow);
  const catStatus = catRow.querySelector('.status');
  try {
    const { error } = await supabaseClient.from('categories').upsert(NEW_CATEGORY);
    if (error) throw error;
    catStatus.textContent = '✓ Catégorie créée';
    catStatus.className = 'status ok';
  } catch (e) {
    catStatus.textContent = '✗ Erreur : ' + e.message;
    catStatus.className = 'status err';
  }

  // 2. Ajouter chaque produit
  for (const p of NEW_PRODUCTS) {
    const row = document.createElement('div');
    row.className = 'row';
    const img = SACS_IMAGES[p.ref] || '';
    row.innerHTML = `<img src="${img}"><div><div>${p.name}</div><div class="status">Envoi…</div></div>`;
    results.appendChild(row);
    const statusEl = row.querySelector('.status');
    try {
      const { error } = await supabaseClient.from('products').upsert({
        id: p.id,
        ref: p.ref,
        name: p.name,
        price: 2.60,
        category_id: NEW_CATEGORY.id,
        image: img,
        unit_step: 1,
        unit_label: '',
        sort_order: 100
      });
      if (error) throw error;
      statusEl.textContent = '✓ Ajouté avec succès';
      statusEl.className = 'status ok';
    } catch (e) {
      statusEl.textContent = '✗ Erreur : ' + e.message;
      statusEl.className = 'status err';
    }
  }
});
</script>
</body>
</html>
