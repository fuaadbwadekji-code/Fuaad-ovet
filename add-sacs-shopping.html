<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajout — Sacs Shopping</title>
<style>
body{font-family:sans-serif;background:#1B2A45;color:#F2E9D8;padding:30px;max-width:600px;margin:0 auto;}
h1{font-size:18px;}
.row{background:#243652;padding:14px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.row img{width:50px;height:50px;object-fit:contain;background:#fff;border-radius:4px;}
.status{font-size:13px;}
.ok{color:#7C8F6E;}
.err{color:#B23B2E;}
button{background:#D89A2C;color:#10192C;border:none;padding:14px 24px;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<h1>👜 Mise à jour des photos — Sacs Shopping</h1>
<p>Cette page remplace les photos des 10 sacs par les images originales du catalogue (non modifiées, fond bleu clair d'origine conservé).</p>
<button id="runBtn">Mettre à jour les photos</button>
<div id="results" style="margin-top:20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="sacs_images.js"></script>
<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const REFS = ['SAC2223','SAC2224','SAC2225','SAC2226','SAC2227','SAC2228','SAC2229','SAC2230','SAC2231','SAC2232'];

document.getElementById('runBtn').addEventListener('click', async () => {
  const results = document.getElementById('results');
  results.innerHTML = '';

  if (typeof SACS_IMAGES === 'undefined') {
    results.innerHTML = '<div class="row"><div class="status err">✗ Erreur : sacs_images.js ne s\'est pas chargé.</div></div>';
    return;
  }

  for (const ref of REFS) {
    const row = document.createElement('div');
    row.className = 'row';
    const img = SACS_IMAGES[ref] || '';
    row.innerHTML = `<img src="${img}"><div><div>${ref}</div><div class="status">Mise à jour…</div></div>`;
    results.appendChild(row);
    const statusEl = row.querySelector('.status');
    try {
      const { error } = await supabaseClient.from('products').update({ image: img }).eq('id', ref);
      if (error) throw error;
      statusEl.textContent = '✓ Photo mise à jour';
      statusEl.className = 'status ok';
    } catch (e) {
      statusEl.textContent = '✗ Erreur : ' + (e.message || JSON.stringify(e));
      statusEl.className = 'status err';
    }
  }

  const doneMsg = document.createElement('div');
  doneMsg.style.marginTop = '14px';
  doneMsg.style.fontWeight = 'bold';
  doneMsg.textContent = '— Terminé —';
  results.appendChild(doneMsg);
});
</script>
</body>
</html>
